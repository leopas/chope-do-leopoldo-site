services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chope-do-leopoldo-site
    ports:
      - "8000:8000"
    env_file:
      - path: .env.local
        required: false
    environment:
      APP_ENV: local
      APP_NAME: chope-do-leopoldo-site
      API_PREFIX: /api
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8000
